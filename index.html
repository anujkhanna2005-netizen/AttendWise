<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" href="/favicon.svg" as="image" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Font preconnect for faster DNS resolution -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />

    <!-- Preload primary stylesheet as high-priority hint, then load it -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" />
    </noscript>

    <!-- Material Symbols (icon font) -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&text=schoolsettingsaddboxclosewarningdeleteedithistorydone_allchevronrightleftwifioffcloudsyncinfocalendartodaycheckcirclecancelpersondashboardanalyticsmorevertarrowdownwardnotificationslockloginlogout&display=swap"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&text=schoolsettingsaddboxclosewarningdeleteedithistorydone_allchevronrightleftwifioffcloudsyncinfocalendartodaycheckcirclecancelpersondashboardanalyticsmorevertarrowdownwardnotificationslockloginlogout&display=swap" />
    </noscript>

    <meta name="theme-color" content="#818cf8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="AttendWise 🎓 Track attendance. Stay above 75%." />
    <!-- PWA icons — SVG is primary (browser tab), PNG only for iOS home screen -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>AttendWise</title>
  </head>
  <body class="bg-background text-on-surface font-body-md selection:bg-primary-container/30 overflow-x-hidden">
    <!-- Background Elements -->
    <div id="root" class="relative z-20"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

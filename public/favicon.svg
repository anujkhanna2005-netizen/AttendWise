<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Vivid diagonal background: sky blue → electric purple → hot pink -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8"/>
      <stop offset="48%"  stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>

    <!-- Glossy sheen on top half -->
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- White cap face highlight -->
    <linearGradient id="capShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.90"/>
    </linearGradient>

    <!-- Gold badge gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Soft drop shadow -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#6d28d9" flood-opacity="0.45"/>
    </filter>

    <!-- Glow for badge -->
    <filter id="badgeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FCD34D" flood-opacity="0.8"/>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="rClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- ── Glossy sheen ── -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#sheen)"/>

  <!-- ── Subtle inner glow ring ── -->
  <rect x="6" y="6" width="500" height="500" rx="108" ry="108"
        fill="none" stroke="white" stroke-width="3" stroke-opacity="0.15"/>

  <!-- ════ GRADUATION CAP ════ -->
  <g filter="url(#shadow)">

    <!-- Cap board (diamond / parallelogram top face) -->
    <polygon
      points="256,118  406,196  256,274  106,196"
      fill="url(#capShine)"
    />
    <!-- Subtle underside edge of cap board -->
    <polygon
      points="256,274  406,196  406,210  256,288  106,210  106,196"
      fill="#c7d2fe"
      opacity="0.6"
    />

    <!-- Cap crown / body below board -->
    <path
      d="M168,210 L168,288 Q168,332 256,348 Q344,332 344,288 L344,210 L256,258 Z"
      fill="url(#capShine)"
      opacity="0.95"
    />
    <!-- Shadow line on crown body left face -->
    <path
      d="M168,210 L256,258 L256,348 Q210,338 185,316 Q168,300 168,288 Z"
      fill="#a5b4fc"
      opacity="0.35"
    />

    <!-- Tassel cord -->
    <line x1="406" y1="196" x2="406" y2="298"
          stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
    <!-- Tassel knot -->
    <circle cx="406" cy="306" r="11" fill="white" opacity="0.95"/>
    <!-- Tassel fringe -->
    <line x1="399" y1="317" x2="393" y2="352" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="406" y1="317" x2="406" y2="354" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="413" y1="317" x2="419" y2="352" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.8"/>

  </g>

  <!-- ════ GOLD BADGE with CHECKMARK ════ -->
  <g filter="url(#badgeGlow)">
    <!-- Outer badge circle -->
    <circle cx="340" cy="356" r="76" fill="url(#goldGrad)"/>
    <!-- Inner white ring -->
    <circle cx="340" cy="356" r="65" fill="none" stroke="white" stroke-width="4" opacity="0.5"/>
    <!-- Bold check -->
    <polyline
      points="306,358  331,383  378,322"
      fill="none"
      stroke="white"
      stroke-width="20"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- ── Cap board top highlight (small shimmer line) ── -->
  <polygon
    points="256,118  340,160  256,202  172,160"
    fill="white"
    opacity="0.18"
  />
</svg>